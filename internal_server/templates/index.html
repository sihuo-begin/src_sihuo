<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>内网培训系统</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
}

.header {
    margin-bottom: 15px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
}

.card {
    background: #ffffff;
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 15px;
}

.card img {
    width: 100%;
    height: 140px;
    object-fit: cover;
    background: #eaeaea;
    border-radius: 4px;
}

.info {
    font-size: 14px;
    margin-top: 10px;
}

.info div {
    margin-bottom: 4px;
}

.actions {
    margin-top: 12px;
    display: flex;
    gap: 10px;
}

.actions a {
    flex: 1;
    text-align: center;
    padding: 6px;
    border-radius: 4px;
    text-decoration: none;
    font-weight: bold;
    color: #fff;
}

.btn-train { background: #007bff; }
.btn-exam  { background: #28a745; }
</style>
</head>

<body>

<div class="header">
    <h2>📚 内网培训系统</h2>
    <form method="get">
        <input type="text" name="keyword" placeholder="按课程 / 工站 / 项目搜索">
        <button type="submit">搜索</button>
        | <a href="/scores">成绩查询</a>
    </form>
</div>

<div class="grid">

{% for m in materials %}
<div class="card">

    <!-- ✅ 固定课程图标 -->
    <img src="/static/course.png" alt="课程图标">

    <!-- ✅ 课程标签信息 -->
    <div class="info">
        <div><strong>课程名称：</strong>{{ m.name }}</div>
        <div><strong>工站名：</strong>{{ m.station }}</div>
        <div><strong>项目名称：</strong>{{ m.project }}</div>
        <div><strong>文件名：</strong>{{ m.file }}</div>
    </div>

    <!-- ✅ 操作按钮 -->
    <div class="actions">
<!--        <a class="btn-train" href="/training/{{ m.id }}">培训</a>-->
        <a class="btn-train" href="/training/{{ m.id }}?employee_id={{ employee_id }}">培训</a>
<!--        <a class="btn-exam"  href="/exam/{{ m.id }}">考试</a>-->
<!--    </div>-->
<!--    <div class="actions">-->

<!--        /training/{{ m.id }}?employee_id={{ employee_id }}-->
<!--            培训-->
<!--        </a>-->

        {% if m.can_exam %}
            /exam/{{ m.id }}?employee_id={{ employee_id }}
                考试
            </a>
        {% else %}
            <button disabled style="background:#aaa">
                考试未解锁
            </button>
        {% endif %}

    </div>

</div>
{% endfor %}

</div>

</body>
</html>
